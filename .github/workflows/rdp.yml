name: Windows RDP Free

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Enable RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        net user runneradmin Password1234!

    - name: Start TCP Tunnel (Serveo)
      run: |
        # Serveo သုံးပြီး 3389 ကို TCP Port တိုက်ရိုက်ထုတ်ခြင်း (Account ဖွင့်စရာမလိုပါ)
        Start-Job -ScriptBlock { ssh -o StrictHostKeyChecking=no -R 0:localhost:3389 serveo.net }
        Start-Sleep -Seconds 10
        
        # ထွက်လာတဲ့ Host/Port ကို Log ထဲမှာ ဖမ်းယူပြသခြင်း
        $job = Get-Job | Where-Object { $_.State -eq 'Running' }
        Start-Sleep -Seconds 5

    - name: Show Connection Info
      run: |
        # Serveo connection log ကို ဆွဲထုတ်ခြင်း
        ssh -o StrictHostKeyChecking=no -R 0:localhost:3389 serveo.net 2>&1 | Select-String "Forwarding"
        Write-Host "=========================================="
        Write-Host " Username: runneradmin"
        Write-Host " Password: Password1234!"
        Write-Host "=========================================="

    - name: Keep Alive (6 Hours)
      run: Start-Sleep -Seconds 21600
