name: Windows RDP with Ngrok

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. RDP Access ကို Windows မှာဖွင့်ခြင်း
    - name: Enable RDP Access
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0

    # 2. RDP Password သတ်မှတ်ခြင်း
    - name: Set RDP Password
      run: |
        net user runneradmin Password1234!

    # 3. Chocolatey ဖြင့် Ngrok တပ်ဆင်ခြင်း
    - name: Install Ngrok
      run: |
        choco install ngrok

    # 4. Ngrok Authtoken ထည့်ခြင်း
    - name: Add Ngrok Authtoken
      run: |
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

    # 5. Ngrok Tunnel စတင်ခြင်းနှင့် IP တိုက်ရိုက်ထုတ်ခြင်း
    - name: Start Ngrok Tunnel & Display IP
      run: |
        Start-Process -FilePath "ngrok" -ArgumentList "tcp 3389 --log=stdout" -RedirectStandardOutput "ngrok.log"
        Start-Sleep -Seconds 8
        Get-Content ngrok.log | Select-String "url=" | ForEach-Object { $_.Line }
        Write-Host "==============================================="
        Write-Host " Username: runneradmin"
        Write-Host " Password: Password1234!"
        Write-Host "==============================================="

    # 6. စက်မပိတ်သွားစေရန် ၆ နာရီကြာ စောင့်ဆိုင်းပေးထားခြင်း
    - name: Keep Alive (6 Hours)
      run: |
        Start-Sleep -Seconds 21600
