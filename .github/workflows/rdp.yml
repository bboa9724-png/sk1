name: Windows RDP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Enable RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        net user runneradmin Password1234!

    - name: Download & Start Ngrok
      run: |
        choco install ngrok
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        # Background မှာ TCP 3389 ကို တိုက်ရိုက်ထုတ်ပေးရန်
        Start-Process -FilePath "ngrok.exe" -ArgumentList "tcp 3389"
        Start-Sleep -Seconds 5

    - name: Get Ngrok TCP Address
      run: |
        # Ngrok API ကနေတစ်ဆင့် တိုက်ရိုက်ထွက်လာတဲ့ TCP IP:Port ကို ယူပြခြင်း
        $response = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels"
        $tcp_url = $response.tunnels[0].public_url
        Write-Host "=========================================="
        Write-Host " RDP ADDRESS: $tcp_url"
        Write-Host " Username: runneradmin"
        Write-Host " Password: Password1234!"
        Write-Host "=========================================="

    - name: Keep Alive
      run: Start-Sleep -Seconds 21600
