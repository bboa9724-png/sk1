name: Windows RDP Playit

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Enable Windows RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        net user runneradmin Password1234! /add
        net localgroup administrators runneradmin /add

    - name: Download Playit.gg
      run: |
        # Playit.gg ရဲ့ တရားဝင် Windows Agent ကို ဒေါင်းလုဒ်လုပ်ခြင်း
        $playitUrl = "https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-windows-amd64.exe"
        Invoke-WebRequest -Uri $playitUrl -OutFile "playit.exe"

    - name: Start Playit.gg Tunnel for RDP (TCP 3389)
      run: |
        # Background မှာ Playit ကို စတင်ခြင်း
        Start-Process -FilePath ".\playit.exe"
        
        Write-Host "=========================================="
        Write-Host " Playit စတင်နေပါပြီ... ခဏစောင့်ပါ"
        Write-Host "=========================================="
        Start-Sleep -Seconds 10

    - name: Instructions for Playit
      run: |
        Write-Host "=========================================="
        Write-Host " 1. ပထမဆုံးအကြိမ် Run ချိန်တွင် Playit Log ထဲတွင် Claim URL တစ်ခု ထွက်လာပါမည်။"
        Write-Host " 2. ထို URL ကို နှိပ်ပြီး Playit အကောင့်ဖြင့် Claim လုပ်ပေးပါ။"
        Write-Host " 3. Playit Dashboard ထဲသို့ ဝင်ပြီး TCP Port 3389 အတွက် Mapping (Tunnel) တစ်ခု ဖန်တီးပေးပါ။"
        Write-Host " ------------------------------------------"
        Write-Host " 👤 Username    : runneradmin"
        Write-Host " 🔑 Password    : Password1234!"
        Write-Host "=========================================="

    - name: Keep Alive (6 Hours)
      run: Start-Sleep -Seconds 21600
