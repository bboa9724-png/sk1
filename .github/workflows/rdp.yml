name: Windows RDP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Enable RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        net user runneradmin Password1234!

    - name: Start Tunnel & Display IP
      run: |
        Start-Job -ScriptBlock { ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -p 443 -R0:localhost:3389 a.pinggy.io }
        
        $retry = 0
        $ipFound = $false
        
        while ($retry -lt 15 -and -not $ipFound) {
            Start-Sleep -Seconds 3
            $logs = Receive-Job -Name "Job1" -Keep
            foreach ($line in $logs) {
                if ($line -like "*tcp://*") {
                    Write-Host "=========================================="
                    Write-Host " YOUR RDP ADDRESS: $line"
                    Write-Host " Username: runneradmin"
                    Write-Host " Password: Password1234!"
                    Write-Host "=========================================="
                    $ipFound = $true
                    break
                }
            }
            $retry++
        }

        if (-not $ipFound) {
            Write-Host "All Logs:"
            Receive-Job -Name "Job1"
        }

    - name: Keep Alive (6 Hours)
      run: Start-Sleep -Seconds 21600
