name: Windows RDP Custom User

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Enable Windows RDP and Setup Custom User
      shell: pwsh
      run: |
        $ErrorActionPreference = 'SilentlyContinue'
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        # runneradmin အစား နာမည်အသစ် 'myadmin' ကို သုံးခြင်း
        cmd.exe /c "net user myadmin Password1234! /add" 2>$null
        cmd.exe /c "net localgroup administrators myadmin /add" 2>$null
        exit 0

    - name: Download Playit.gg
      shell: pwsh
      run: |
        $ErrorActionPreference = 'SilentlyContinue'
        $playitUrl = "https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-windows-amd64.exe"
        Invoke-WebRequest -Uri $playitUrl -OutFile "playit.exe"

    - name: Start Playit.gg
      shell: pwsh
      run: |
        $ErrorActionPreference = 'SilentlyContinue'
        Start-Process -FilePath ".\playit.exe"
        Start-Sleep -Seconds 5

    - name: RDP Credentials Info
      shell: pwsh
      run: |
        Write-Host "=========================================="
        Write-Host " 👤 Username    : myadmin"
        Write-Host " 🔑 Password    : Password1234!"
        Write-Host "=========================================="

    - name: Keep Alive (6 Hours)
      shell: pwsh
      run: Start-Sleep -Seconds 21600
