name: Windows RDP Playit Fixed

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Enable Windows RDP and Setup User
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        # Account ရှိမရှိ စစ်ဆေးပြီးမှ Password ပြောင်းခြင်း သို့မဟုတ် အသစ်ဖန်တီးခြင်း
        if (Get-LocalUser -Name "runneradmin" -ErrorAction SilentlyContinue) {
            Write-Host "Account already exists. Setting password..."
            net user runneradmin Password1234!
        } else {
            Write-Host "Creating new account..."
            net user runneradmin Password1234! /add
        }

        # Administrators Group ထဲမှာ ရှိပြီးသားဆိုရင် Error မတက်အောင် ထပ်မစစ်ဘဲ ထည့်ခြင်း
        net localgroup administrators runneradmin /add 2>$null

    - name: Download Playit.gg
      run: |
        $playitUrl = "https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-windows-amd64.exe"
        Invoke-WebRequest -Uri $playitUrl -OutFile "playit.exe"

    - name: Start Playit.gg Tunnel for RDP (TCP 3389)
      run: |
        Start-Process -FilePath ".\playit.exe"
        Write-Host "=========================================="
        Write-Host " Playit စတင်နေပါပြီ... ခဏစောင့်ပါ"
        Write-Host "=========================================="
        Start-Sleep -Seconds 10

    - name: Instructions for Playit
      run: |
        Write-Host "=========================================="
        Write-Host " 1. Playit Log ထဲမှ Claim URL ကို ယူပြီး အကောင့်ချိတ်ပါခင်ဗျာ။"
        Write-Host " ------------------------------------------"
        Write-Host " 👤 Username    : runneradmin"
        Write-Host " 🔑 Password    : Password1234!"
        Write-Host "=========================================="

    - name: Keep Alive (6 Hours)
      run: Start-Sleep -Seconds 21600
