name: Windows RDP Stable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Enable Windows RDP and Setup User
      shell: pwsh
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        # User ရှိပြီးသားဖြစ်နေရင် Error မတက်အောင် Try-Catch သုံးခြင်း
        try {
            net user runneradmin "Password1234!" /add
        } catch {
            net user runneradmin "Password1234!"
        }

        # Admin group ထဲမှာ ရှိပြီးသားဆိုရင် Error မျက်ကွယ်ပြုရန်
        try {
            net localgroup administrators runneradmin /add
        } catch {
            Write-Host "Admin group already contains user, continuing..."
        }

    - name: Download Playit.gg
      shell: pwsh
      run: |
        $playitUrl = "https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-windows-amd64.exe"
        Invoke-WebRequest -Uri $playitUrl -OutFile "playit.exe"

    - name: Start Playit.gg
      shell: pwsh
      run: |
        Start-Process -FilePath ".\playit.exe"
        Start-Sleep -Seconds 5

    - name: Keep Alive (6 Hours)
      shell: pwsh
      run: Start-Sleep -Seconds 21600
