name: Windows RDP with Ngrok

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Enable RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        net user runneradmin Password1234!

    - name: Install & Start Ngrok
      run: |
        choco install ngrok
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        
        # Ngrok Version 3 တွင် Foreground Run ပြီး Log ကို ဖိုင်ထဲ တိုက်ရိုက် ရေးခိုင်းခြင်း
        Start-Process -FilePath "ngrok" -ArgumentList "tcp 3389 --log stdout" -RedirectStandardOutput "ngrok.log"
        Start-Sleep -Seconds 8

    - name: Display RDP IP
      run: |
        # ngrok.log ဖိုင်ထဲမှ url ကို တိုက်ရိုက် ဆွဲထုတ်ပြခြင်း
        Get-Content ngrok.log | Select-String "url="
        Write-Host "=========================================="
        Write-Host "Username: runneradmin"
        Write-Host "Password: Password1234!"
        Write-Host "=========================================="

    - name: Keep Alive
      run: Start-Sleep -Seconds 21600
