name: Windows RDP Auto

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Enable Windows RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        net user runneradmin Password1234! /add
        net localgroup administrators runneradmin /add

    - name: Download & Start Ngrok
      run: |
        # Ngrok ကို တိုက်ရိုက်ဒေါင်းလုဒ်လုပ်ခြင်း
        Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
        Expand-Archive -Path "ngrok.zip" -DestinationPath "." -Force
        
        # Auth Token ထည့်ခြင်း
        .\ngrok.exe config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        
        # Background မှာ TCP 3389 ပွင့်စေရန် Run ခြင်း
        Start-Process -FilePath ".\ngrok.exe" -ArgumentList "tcp 3389"
        Start-Sleep -Seconds 7

    - name: Show RDP Address in Logs
      run: |
        # Ngrok Local API ကနေ TCP Address ကို ဆွဲထုတ်ပြခြင်း (Dashboard ဝင်စရာ မလိုပါ)
        $response = Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels"
        $tcp_url = $response.tunnels | Where-Object { $_.proto -eq "tcp" } | Select-Object -ExpandProperty public_url
        
        Write-Host "=========================================="
        Write-Host " 👉 RDP ADDRESS : $tcp_url"
        Write-Host " 👤 Username    : runneradmin"
        Write-Host " 🔑 Password    : Password1234!"
        Write-Host "=========================================="

    - name: Keep Alive (6 Hours)
      run: Start-Sleep -Seconds 21600
