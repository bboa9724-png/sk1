name: Windows RDP with Ngrok

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. RDP ကို Windows တွင် ဖွင့်ခြင်း
    - name: Enable RDP Access
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0

    # 2. Windows User သတ်မှတ်ခြင်း (Username: runneradmin / Password: Password1234!)
    - name: Set RDP Password
      run: |
        net user runneradmin Password1234!

    # 3. Chocolatey ဖြင့် Ngrok တပ်ဆင်ခြင်း
    - name: Install Ngrok
      run: |
        choco install ngrok

    # 4. Ngrok Authtoken ထည့်ပြီး Background တွင် Run ခြင်း
    - name: Start Ngrok Tunnel
      run: |
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        Start-Process -FilePath "ngrok.exe" -ArgumentList "tcp 3389" -WindowStyle Hidden
        Start-Sleep -Seconds 10

    # 5. RDP IP နှင့် Port ကို Log တွင် ပြသခြင်း
    - name: Get RDP IP & Port
      run: |
        $retry = 0
        $ip = $null
        while ($retry -lt 10 -and -not $ip) {
            try {
                $tunnel = Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels" -ErrorAction Stop
                $ip = $tunnel.tunnels[0].public_url
            } catch {
                Start-Sleep -Seconds 3
                $retry++
            }
        }

        if ($ip) {
            Write-Host "==============================================="
            Write-Host " YOUR RDP IP:PORT IS => $ip"
            Write-Host " Username: runneradmin"
            Write-Host " Password: Password1234!"
            Write-Host "==============================================="
        } else {
            Write-Host "Failed to retrieve Ngrok Tunnel URL."
            exit 1
        }

    # 6. စက်မပိတ်သွားစေရန် ၆ နာရီကြာ စောင့်ဆိုင်းပေးထားခြင်း
    - name: Keep Alive (6 Hours)
      run: |
        Start-Sleep -Seconds 21600
